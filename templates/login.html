<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .auth-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeIn 0.6s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-title {
            font-size: 1.75rem;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .form-group { margin-bottom: 20px; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }
        .form-group input:focus { border-color: #4ade80; }
        .form-group input::placeholder { color: #94a3b8; }
        .auth-button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: #0f2027;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(74, 222, 128, 0.4);
        }
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        .auth-link {
            display: block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .auth-link:hover { color: #4ade80; }
        .auth-link + .auth-link { margin-top: 10px; }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        .alert-success { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .alert-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .alert-warning { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .forgot-link {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .forgot-link a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .forgot-link a:hover { color: #4ade80; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 class="auth-title">Welcome Back</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email address" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="forgot-link">
                <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
            </div>
            <button type="submit" class="auth-button">Log In</button>
        </form>
        <div class="auth-links">
            <a href="{{ url_for('register') }}" class="auth-link">Don't have an account? Register</a>
            <a href="{{ url_for('home') }}" class="auth-link">&larr; Back to Home</a>
        </div>
    </div>
</body>
</html>
