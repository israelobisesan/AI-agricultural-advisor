<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Email</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .auth-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon { font-size: 3rem; margin-bottom: 20px; }
        .auth-title {
            font-size: 1.5rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, #4ade80, #22c55e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .confirm-message {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .auth-link {
            display: inline-block;
            color: #4ade80;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .auth-link:hover { color: #22c55e; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="icon">📧</div>
        <h2 class="auth-title">Thank you for registering!</h2>
        <p class="confirm-message">Please check your email to confirm your account. If you don't see it, check your spam folder.</p>
        <a href="{{ url_for('login') }}" class="auth-link">Go to Login</a>
    </div>
</body>
</html>
